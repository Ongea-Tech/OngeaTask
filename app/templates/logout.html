<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Logout</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='dist/output.css') }}">
</head>

<body class="min-h-screen flex items-center justify-center bg-gray-100">

  {% with messages = get_flashed_messages() %}
  {% if messages %}
    <div id="flash-container" class="fixed top-6 left-1/2 -translate-x-1/2 z-50">
      {% for message in messages %}
        <div class="flash-message bg-red-500 text-white px-4 py-2 rounded-md shadow-md mb-2">
          {{ message }}
        </div>
      {% endfor %}
    </div>
  {% endif %}
{% endwith %}

  <div class="bg-white rounded-md shadow-md w-[360px] p-8 text-center">

    <h2 class="text-base font-semibold text-gray-900 mb-6">
      <span class="text-[#315EFF]">Ongea</span>
      <span> Task</span>
    </h2>

    <h3 class="text-lg font-semibold mb-4">Logout</h3>

    <p class="text-sm text-gray-700 mb-6">
      Are you sure you want to log out from Ongea Task?
    </p>

    <div class="flex justify-center gap-4">
      <a href="{{ url_for('routes.index') }}"
         class="w-[90px] h-10 rounded-md bg-gray-500 text-white flex items-center justify-center">
        No
      </a>

      <a href="{{ url_for('auth.logout') }}" 
         class="w-[90px] h-10 rounded-md bg-red-600 text-white flex items-center justify-center">
        Yes
      </a>
    </div>

  </div>

  <script>
  setTimeout(() => {
    const flashes = document.querySelectorAll(".flash-message");
    flashes.forEach(flash => {
      flash.style.transition = "opacity 0.5s ease";
      flash.style.opacity = "0";
      setTimeout(() => flash.remove(), 500);
    });
  }, 2000); 
</script>

</body>
</html>
