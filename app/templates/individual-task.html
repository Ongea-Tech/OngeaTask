{% extends "index.html" %} {% block content %}

<div class="taskContainer" data-task-id="{{ task.id }}">
  <a href="{{ url_for('routes.index') }}"
    ><i class="fa-solid fa-arrow-left"></i
  ></a>

  <div class="title">
    <h2>{{ task.title }}</h2>
    <div class="category-dropdown">
      <label class="category" id="categoryLabel">Select Category</label>
      <div class="dropdown-menu" id="categoryMenu">
        <div class="dropdown-option" data-color="red">
          <span class="color-circle" style="background-color: red"></span> High
        </div>
        <div class="dropdown-option" data-color="grey">
          <span class="color-circle" style="background-color: grey"></span>
          Medium
        </div>
        <div class="dropdown-option" data-color="green">
          <span class="color-circle" style="background-color: #4caf50"></span>
          Low
        </div>
      </div>
    </div>
  </div>

  <div class="description">
    <textarea
      id="descriptionBox"
      placeholder="Add a description here..."
      class="w-full flex h-[120px] p-[15px] border-none focus:outline-none bg-white"
    >
{{ task.description }}</textarea
    >
    <button
      id="saveDescriptionBtn"
      class="save-button mt-[5px] px-[12px] py-[6px] bg-gray-500 text-white border-none rounded-[4px] text-[0.9rem] cursor-not-allowed opacity-60 relative left-0"
      disabled
    >
      Save
    </button>
  </div>

  <div class="w-full flex justify-end mt-[10px]">
    <div class="flex flex-col items-center">
      <button
        id="generateSubtasksBtn"
        type="button"
        disabled
        class="bg-blue-600 text-white px-[12px] py-[6px] rounded-[4px] text-[0.9rem] hover:bg-blue-700 disabled:bg-gray-400 disabled:cursor-not-allowed"
      >
        ✨ Generate Subtasks with AI
      </button>

      <p
        id="genBtnMessage"
        class="hidden text-gray-400 px-[2px] italic text-right"
      >
        List exists. Delete all to regenerate.
      </p>
    </div>
  </div>

  <!-- Bulk Actions -->
  <div
    id="bulkActions"
    style="display: none"
    class="bulk-actions flex items-center gap-[10px] mt-[10px]"
  >
    <button
      type="button"
      id="checkAllBtn"
      class="checkAll w-[20px] h-[20px] border border-gray-400 rounded-[3px] cursor-pointer"
    ></button>

    <form
      id="markCompletedForm"
      method="POST"
      action="{{ url_for('routes.mark_completed') }}"
    >
      <input type="hidden" name="completed_ids" id="completedTaskIds" />
      <div>
        <button id="markCompleteBtn" class="markComplete" type="submit">
          Mark as Completed
        </button>
      </div>
    </form>

    <form
      id="deleteSelectedForm"
      method="POST"
      action="{{ url_for('routes.delete_selected') }}"
    >
      <input type="hidden" name="delete_ids" id="deleteTaskIds" />
      <button type="submit" id="deleteSelectedBtn" class="deleteSelected">
        🗑️ Delete Selected
      </button>
    </form>
  </div>

  <div class="subtasks" id="subtaskList">
    {% for subtask in task.subtasks %}
    <label
      class="checkbox flex items-center justify-between border border-gray-200 rounded-[4px] p-[8px] mb-[5px]"
      data-subtask-id="{{ subtask.id }}"
    >
      <div class="flex items-center gap-[8px]">
        <input
          type="checkbox"
          class="w-[16px] h-[16px] accent-green-600 cursor-pointer"
          {%
          if
          subtask.completed
          %}checked{%
          endif
          %}
        />
        <p>{{ subtask.title }}</p>
      </div>

      <div class="flex items-center gap-4">
        <a
          href="#"
          class="icon1 text-gray-500 hover:text-blue-600 edit-btn"
          data-id="{{ subtask.id }}"
        >
          <i class="fa-solid fa-pen"></i>
        </a>
        <a href="#" class="icon text-gray-500 hover:text-red-600">
          <i class="fa-solid fa-trash-can"></i>
        </a>
      </div>
    </label>
    <br />
    {% endfor %}
  </div>

  <!-- Add Subtask -->

  <div
    class="addSubtask flex items-center gap-[8px] mt-[10px] h-[40px]"
    id="addSubtaskContainer"
  >
    <input
      type="text"
      placeholder="Add a new list item"
      id="subtaskInput"
      class="collapsed border border-gray-300 rounded-[4px] px-[10px] py-[6px] flex-1 focus:outline-none"
    />

    <button
      id="expandInputBtn"
      type="button"
      class="expand-btn text-xl text-gray-600 hover:text-black"
    >
      ➕
    </button>

    <button
      class="inputButton bg-blue-600 text-white px-[12px] py-[6px] rounded-[4px] text-[0.9rem] hover:bg-blue-700"
      id="addSubtaskBtn"
    >
      Add
    </button>
  </div>
</div>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    const taskId = "{{ task.id }}";
    const subtaskList = document.getElementById("subtaskList");
    const genBtn = document.getElementById("generateSubtasksBtn");
    let allChecked = false;

    // Helper to manage AI button state
    function updateGenButtonState() {
      const items = subtaskList.querySelectorAll(".checkbox");
      const genMsg = document.getElementById("genBtnMessage"); // Get the message element

      if (items.length > 0) {
        // Subtasks exist: Disable button and show message
        genBtn.disabled = true;
        genMsg.classList.remove("hidden");
      } else {
        // No subtasks: Enable button and hide message
        genBtn.disabled = false;
        genMsg.classList.add("hidden");
      }
    }

    updateGenButtonState();
    genBtn.addEventListener("click", async () => {
      const confirmed = confirm("Generate subtasks using AI?");
      if (!confirmed) return;

      const originalText = genBtn.textContent;
      genBtn.textContent = "✨ Thinking...";
      genBtn.disabled = true;

      try {
        const response = await fetch(`/generate_subtasks/${taskId}`, {
          method: "POST",
        });

        const data = await response.json();

        if (response.ok) {
          location.reload();
        } else {
          // Display specific "Duplicate" or "Already Exists" message from server
          alert(data.message || "Failed to generate subtasks.");
          genBtn.textContent = originalText;
          updateGenButtonState();
        }
      } catch (error) {
        alert("An error occurred. Please check your connection.");
        genBtn.textContent = originalText;
        updateGenButtonState();
      }
    });

    document
      .getElementById("addSubtaskBtn")
      .addEventListener("click", async function () {
        const input = document.getElementById("subtaskInput");
        const subtaskText = input.value.trim();

        if (subtaskText === "") {
          alert("Please enter a new item.");
          return;
        }

        const existingSubtasks = Array.from(
          subtaskList.querySelectorAll("p"),
        ).map((p) => p.innerText.toLowerCase().trim());

        if (existingSubtasks.includes(subtaskText.toLowerCase())) {
          alert(
            "Duplicate subtask detected! This item is already in your list.",
          );
          return;
        }

        const response = await fetch(`/api/tasks/${taskId}/subtasks`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ title: subtaskText }),
        });

        if (response.ok) {
          location.reload();
        } else {
          alert("Failed to add subtask.");
        }
      });

    // Delete subtask with AI Button Polish
    subtaskList.addEventListener("click", async function (event) {
      if (event.target.classList.contains("fa-trash-can")) {
        event.preventDefault();
        const label = event.target.closest(".checkbox");
        const subtaskId = label.getAttribute("data-subtask-id");

        if (confirm("Are you sure you want to delete this subtask?")) {
          const res = await fetch(`/api/subtasks/${subtaskId}`, {
            method: "DELETE",
          });
          if (res.ok) {
            label.remove();
            updateGenButtonState(); // Re-enable AI button if empty
          } else {
            alert("Failed to delete subtask.");
          }
        }
      }
    });

    // Bulk Actions Logic
    subtaskList.addEventListener("change", function () {
      const checkboxes = subtaskList.querySelectorAll("input[type='checkbox']");
      const anyChecked = Array.from(checkboxes).some((cb) => cb.checked);
      document.getElementById("bulkActions").style.display = anyChecked
        ? "flex"
        : "none";
    });

    const checkAllBtn = document.getElementById("checkAllBtn");
    checkAllBtn.addEventListener("click", function () {
      const checkboxes = document.querySelectorAll(
        "#subtaskList input[type='checkbox']",
      );
      allChecked = !allChecked;
      checkboxes.forEach((cb) => (cb.checked = allChecked));
      const anyChecked = Array.from(checkboxes).some((cb) => cb.checked);
      document.getElementById("bulkActions").style.display = anyChecked
        ? "flex"
        : "none";
    });

    // Mark Completed Logic
    document
      .getElementById("markCompletedForm")
      .addEventListener("submit", async function (e) {
        e.preventDefault();
        const checkboxes = document.querySelectorAll(
          "#subtaskList input[type='checkbox']:checked",
        );
        const ids = Array.from(checkboxes).map((cb) =>
          cb.closest(".checkbox").getAttribute("data-subtask-id"),
        );

        if (ids.length === 0) {
          alert("Please select at least one subtask.");
          return;
        }

        const response = await fetch("{{ url_for('routes.mark_completed') }}", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ completed_ids: ids }),
        });

        if (response.ok) {
          location.reload();
        } else {
          alert("Failed to update tasks.");
        }
      });

    // Delete Selected Logic
    document
      .getElementById("deleteSelectedForm")
      .addEventListener("submit", function (e) {
        const checkboxes = document.querySelectorAll(
          "#subtaskList input[type='checkbox']:checked",
        );
        const ids = Array.from(checkboxes).map((cb) =>
          cb.closest(".checkbox").getAttribute("data-subtask-id"),
        );

        if (ids.length === 0) {
          e.preventDefault();
          alert("Please select at least one item.");
          return;
        }

        if (!confirm("Delete selected subtasks?")) {
          e.preventDefault();
          return;
        }

        document.getElementById("deleteTaskIds").value = ids.join(",");
      });

    // Description Save Logic
    const descriptionBox = document.getElementById("descriptionBox");
    const saveButton = document.getElementById("saveDescriptionBtn");
    let originalDescription = descriptionBox.value.trim();

    descriptionBox.addEventListener("input", function () {
      const currentText = descriptionBox.value.trim();
      saveButton.disabled = currentText === originalDescription;
      saveButton.style.opacity = saveButton.disabled ? "0.6" : "1";
    });

    saveButton.addEventListener("click", async function () {
      const newDescription = descriptionBox.value.trim();
      const response = await fetch(`/api/tasks/${taskId}/description`, {
        method: "PATCH",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ description: newDescription }),
      });

      if (response.ok) {
        originalDescription = newDescription;
        saveButton.disabled = true;
        saveButton.style.opacity = "0.6";
      }
    });

    // Edit Subtask Logic
    const editButtons = document.querySelectorAll(".edit-btn");
    editButtons.forEach((btn) => {
      btn.addEventListener("click", (e) => {
        e.preventDefault();
        const subtaskId = btn.getAttribute("data-id");
        const currentTitle = btn
          .closest(".checkbox")
          .querySelector("p").innerText;
        const newTitle = prompt("Edit Subtask Title:", currentTitle);

        if (newTitle && newTitle.trim() !== "") {
          fetch(`/edit_subtask/${subtaskId}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ title: newTitle }),
          }).then((res) =>
            res.ok ? window.location.reload() : alert("Error saving."),
          );
        }
      });
    });

    // Input Expansion Logic
    const expandBtn = document.getElementById("expandInputBtn");
    const inputField = document.getElementById("subtaskInput");
    expandBtn.addEventListener("click", () => {
      inputField.classList.toggle("expanded");
      inputField.classList.toggle("collapsed");
      if (inputField.classList.contains("expanded")) inputField.focus();
    });
  });
</script>
{% endblock %}
