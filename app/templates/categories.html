{% extends "index.html" %}
{% block content %}
<div class="categories-page" id="categoriesApp">
  <h2 class="categories-title">Categories</h2>

  <!-- Top row: AI insights (left half) + buttons (right half) -->
  <div class="cat-top-row">
    <div id="insights-banner" class="insights-banner">
      <div class="insight-placeholder"><i class="fa-solid fa-robot"></i> AI recommendations will appear here</div>
    </div>
    <div class="cat-top-actions">
      <button id="smart-create-btn" class="btn-smart"><i class="fa-solid fa-wand-magic-sparkles"></i> Smart Create</button>
      <button id="add-category-btn" class="btn-primary-cat"><i class="fa-solid fa-plus"></i> Add Category</button>
    </div>
  </div>

  <!-- Filter/Sort -->
  <div class="filter-bar">
    <div class="filter-group">
      <select id="sort-by" class="filter-select">
        <option value="newest">Newest First</option>
        <option value="name-az">Name A-Z</option>
        <option value="name-za">Name Z-A</option>
        <option value="most-tasks">Most Tasks</option>
        <option value="least-tasks">Fewest Tasks</option>
        <option value="completion">Completion Rate</option>
      </select>
      <select id="filter-by" class="filter-select">
        <option value="all">All Categories</option>
        <option value="with-tasks">With Tasks</option>
        <option value="empty">Empty</option>
        <option value="overdue">Has Overdue</option>
        <option value="archived">Archived</option>
      </select>
    </div>
    <div class="bulk-bar" id="bulk-bar" style="display:none;">
      <span id="selected-count">0 selected</span>
      <button id="bulk-delete-btn" class="btn-danger-sm"><i class="fa-solid fa-trash"></i> Delete Selected</button>
    </div>
  </div>

  <!-- Category Grid -->
  <div class="category-grid" id="category-grid">
    <div class="loading-spinner" id="loading"><i class="fa-solid fa-spinner fa-spin"></i> Loading...</div>
  </div>
</div>

<!-- Add/Edit Modal -->
<div id="category-modal" class="cat-modal" style="display:none;">
  <div class="cat-modal-overlay"></div>
  <div class="cat-modal-content">
    <h3 id="modal-title">Add Category</h3>
    <div class="modal-field"><label>Name</label><input type="text" id="cat-name" placeholder="e.g. Work Projects" maxlength="100"/></div>
    <div class="modal-field"><label>Description <span class="optional">(optional)</span></label><input type="text" id="cat-desc" placeholder="Short description..." maxlength="200"/></div>
    <div class="modal-field"><label>Icon</label>
      <div class="icon-picker" id="icon-picker">
        <span class="icon-option active" data-icon="fa-folder"><i class="fa-solid fa-folder"></i></span>
        <span class="icon-option" data-icon="fa-briefcase"><i class="fa-solid fa-briefcase"></i></span>
        <span class="icon-option" data-icon="fa-house"><i class="fa-solid fa-house"></i></span>
        <span class="icon-option" data-icon="fa-heart"><i class="fa-solid fa-heart"></i></span>
        <span class="icon-option" data-icon="fa-book"><i class="fa-solid fa-book"></i></span>
        <span class="icon-option" data-icon="fa-code"><i class="fa-solid fa-code"></i></span>
        <span class="icon-option" data-icon="fa-graduation-cap"><i class="fa-solid fa-graduation-cap"></i></span>
        <span class="icon-option" data-icon="fa-dumbbell"><i class="fa-solid fa-dumbbell"></i></span>
        <span class="icon-option" data-icon="fa-cart-shopping"><i class="fa-solid fa-cart-shopping"></i></span>
        <span class="icon-option" data-icon="fa-gamepad"><i class="fa-solid fa-gamepad"></i></span>
        <span class="icon-option" data-icon="fa-music"><i class="fa-solid fa-music"></i></span>
        <span class="icon-option" data-icon="fa-star"><i class="fa-solid fa-star"></i></span>
      </div>
    </div>
    <div class="modal-field"><label>Color</label>
      <div class="color-row">
        <input type="color" id="cat-color" value="#3b82f6"/>
        <div class="preset-colors">
          <span class="color-swatch" data-color="#ef4444" style="background:#ef4444;"></span>
          <span class="color-swatch" data-color="#f59e0b" style="background:#f59e0b;"></span>
          <span class="color-swatch" data-color="#22c55e" style="background:#22c55e;"></span>
          <span class="color-swatch" data-color="#3b82f6" style="background:#3b82f6;"></span>
          <span class="color-swatch" data-color="#8b5cf6" style="background:#8b5cf6;"></span>
          <span class="color-swatch" data-color="#ec4899" style="background:#ec4899;"></span>
          <span class="color-swatch" data-color="#14b8a6" style="background:#14b8a6;"></span>
          <span class="color-swatch" data-color="#f97316" style="background:#f97316;"></span>
        </div>
        <button type="button" id="suggest-color-btn" class="btn-tiny" title="AI suggest"><i class="fa-solid fa-palette"></i></button>
      </div>
    </div>
    <div class="cat-modal-buttons">
      <button id="modal-cancel-btn" class="btn-cancel">Cancel</button>
      <button id="modal-confirm-btn" class="btn-confirm">Save</button>
    </div>
  </div>
</div>

<!-- Add Task Modal -->
<div id="add-task-modal" class="cat-modal" style="display:none;">
  <div class="cat-modal-overlay"></div>
  <div class="cat-modal-content">
    <h3>Add Task to <span id="task-modal-cat-name"></span></h3>
    <div class="modal-field"><label>Task Title</label><input type="text" id="new-task-title" placeholder="What needs to be done?"/></div>
    <div class="modal-field"><label>Description <span class="optional">(optional)</span></label><textarea id="new-task-desc" rows="2" placeholder="Details..."></textarea></div>
    <div class="cat-modal-buttons">
      <button id="task-modal-cancel" class="btn-cancel">Cancel</button>
      <button id="task-modal-confirm" class="btn-confirm">Add Task</button>
    </div>
  </div>
</div>

<!-- Smart Create Modal -->
<div id="smart-modal" class="cat-modal" style="display:none;">
  <div class="cat-modal-overlay"></div>
  <div class="cat-modal-content">
    <h3><i class="fa-solid fa-wand-magic-sparkles"></i> Smart Category</h3>
    <div class="modal-field"><label>Describe what you need</label>
      <textarea id="smart-input" rows="4" placeholder='e.g. "urgent work deadlines", "fitness tracking goals"' style="width:100%;resize:vertical;"></textarea>
    </div>
    <div id="smart-preview" style="display:none;" class="smart-preview"></div>
    <div class="cat-modal-buttons">
      <button id="smart-cancel" class="btn-cancel">Cancel</button>
      <button id="smart-generate" class="btn-confirm"><i class="fa-solid fa-wand-magic-sparkles"></i> Generate</button>
      <button id="smart-save" class="btn-confirm" style="display:none;">Save Category</button>
    </div>
  </div>
</div>

<!-- Confirm -->
<div id="confirm-dialog" class="cat-modal" style="display:none;">
  <div class="cat-modal-overlay"></div>
  <div class="cat-modal-content cat-modal-sm">
    <p id="confirm-msg">Are you sure?</p>
    <div class="cat-modal-buttons">
      <button id="confirm-no" class="btn-cancel">Cancel</button>
      <button id="confirm-yes" class="btn-danger">Yes, Delete</button>
    </div>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function(){
  let allCategories=[], editingId=null, selectedIds=new Set(), addTaskCategoryId=null, smartData=null, confirmCallback=null, expandedTasks={};
  const grid=document.getElementById("category-grid"), loading=document.getElementById("loading"),
    modal=document.getElementById("category-modal"), taskModal=document.getElementById("add-task-modal"),
    smartModal=document.getElementById("smart-modal"), confirmDialog=document.getElementById("confirm-dialog"),
    bulkBar=document.getElementById("bulk-bar");

  // WCAG 2.0 contrast helper
  function textColorForBg(hex){
    const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
    const lum=(0.299*r+0.587*g+0.114*b)/255;
    return lum>0.55?"#1a1a1a":"#ffffff";
  }
  function lightBg(hex,alpha){
    const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
    return `rgba(${r},${g},${b},${alpha})`;
  }

  async function api(url,opts={}){
    opts.headers={"Content-Type":"application/json",...(opts.headers||{})};
    if(opts.body&&typeof opts.body==="object") opts.body=JSON.stringify(opts.body);
    return (await fetch(url,opts)).json();
  }

  async function loadCategories(){
    loading.style.display="flex";
    const f=document.getElementById("filter-by").value;
    allCategories=await api(f==="archived"?"/api/categories?archived=true":"/api/categories");
    renderCategories();
    loading.style.display="none";
    loadInsights();
  }

  async function loadInsights(){
    try{
      const data=await api("/api/categories/insights");
      const banner=document.getElementById("insights-banner");
      if(!data.insights.length&&!data.ai_suggestion){banner.innerHTML='<div class="insight-placeholder"><i class="fa-solid fa-robot"></i> No recommendations right now</div>';return;}
      let h="";
      data.insights.forEach(i=>{h+=`<div class="insight-item insight-${i.type}"><i class="fa-solid ${i.icon}"></i> <strong>${i.message}</strong> — ${i.action}</div>`;});
      if(data.ai_suggestion) h+=`<div class="insight-item insight-ai"><i class="fa-solid fa-robot"></i> <strong>AI:</strong> ${data.ai_suggestion}</div>`;
      banner.innerHTML=h;
    }catch(e){}
  }

  function renderCategories(){
    const sortVal=document.getElementById("sort-by").value, filterVal=document.getElementById("filter-by").value;
    let cats=[...allCategories];
    if(filterVal==="with-tasks") cats=cats.filter(c=>c.total_tasks>0);
    else if(filterVal==="empty") cats=cats.filter(c=>c.total_tasks===0);
    else if(filterVal==="overdue") cats=cats.filter(c=>c.overdue_tasks>0);
    else if(filterVal==="archived") cats=cats.filter(c=>c.archived);
    else cats=cats.filter(c=>!c.archived);
    if(sortVal==="name-az") cats.sort((a,b)=>a.name.localeCompare(b.name));
    else if(sortVal==="name-za") cats.sort((a,b)=>b.name.localeCompare(a.name));
    else if(sortVal==="most-tasks") cats.sort((a,b)=>b.total_tasks-a.total_tasks);
    else if(sortVal==="least-tasks") cats.sort((a,b)=>a.total_tasks-b.total_tasks);
    else if(sortVal==="completion") cats.sort((a,b)=>b.completion_rate-a.completion_rate);
    else cats.sort((a,b)=>new Date(b.created_at||0)-new Date(a.created_at||0));

    if(!cats.length){grid.innerHTML='<div class="empty-state"><i class="fa-solid fa-folder-open"></i><p>No categories yet. Create one!</p></div>';return;}

    grid.innerHTML=cats.map(c=>{
      const pct=c.completion_rate||0, tc=textColorForBg(c.color), isSel=selectedIds.has(c.id),
        created=c.created_at?new Date(c.created_at).toLocaleDateString("en-US",{month:"short",day:"numeric"}):"",
        isExpanded=!!expandedTasks[c.id];
      return `<div class="cat-card ${isSel?"selected":""} ${c.archived?"archived":""} ${isExpanded?"expanded":""}" data-id="${c.id}" style="background:${lightBg(c.color,0.12)};border-color:${c.color};">
        <div class="cat-card-top">
          <input type="checkbox" class="cat-cb" data-id="${c.id}" ${isSel?"checked":""}/>
          <div class="cat-icon" style="background:${c.color};color:${tc};"><i class="fa-solid ${c.icon||"fa-folder"}"></i></div>
          <div class="cat-info">
            <h4 class="cat-name" style="color:${textColorForBg(lightBg(c.color,0.12).length>7?c.color:'#f0f0f0')}">${c.name}</h4>
            ${c.description?`<p class="cat-desc">${c.description}</p>`:""}
          </div>
          <div class="cat-actions-menu">
            <button class="cat-menu-btn" data-id="${c.id}"><i class="fa-solid fa-ellipsis-vertical"></i></button>
            <div class="cat-dropdown" id="dropdown-${c.id}">
              <button class="cat-dd-item" data-action="edit" data-id="${c.id}"><i class="fa-solid fa-pen"></i> Edit</button>
              <button class="cat-dd-item" data-action="add-task" data-id="${c.id}"><i class="fa-solid fa-plus"></i> Add Task</button>
              <button class="cat-dd-item" data-action="archive" data-id="${c.id}"><i class="fa-solid ${c.archived?"fa-box-open":"fa-box-archive"}"></i> ${c.archived?"Unarchive":"Archive"}</button>
              <button class="cat-dd-item cat-dd-danger" data-action="delete" data-id="${c.id}"><i class="fa-solid fa-trash"></i> Delete</button>
            </div>
          </div>
        </div>
        <div class="cat-stats"><span><i class="fa-solid fa-list-check"></i> ${c.total_tasks} tasks</span><span><i class="fa-solid fa-circle-check"></i> ${c.completed_tasks} done</span>${c.overdue_tasks>0?`<span class="stat-overdue"><i class="fa-solid fa-clock"></i> ${c.overdue_tasks} overdue</span>`:""}</div>
        <div class="cat-progress-wrap"><div class="cat-progress-bar" style="width:${pct}%;background:${c.color};"></div></div>
        <div class="cat-footer"><span class="cat-rate" style="color:${c.color};">${pct}% complete</span><span class="cat-date">${created}</span>
          <button class="expand-btn" data-id="${c.id}"><i class="fa-solid ${isExpanded?"fa-chevron-up":"fa-chevron-down"}"></i></button>
        </div>
        <div class="cat-tasks-panel" id="tasks-panel-${c.id}" style="display:${isExpanded?"block":"none"};"><div class="tasks-loading"><i class="fa-solid fa-spinner fa-spin"></i></div></div>
      </div>`;
    }).join("");
    attachCardListeners();
  }

  // Expand/collapse + load tasks
  async function toggleExpand(catId){
    if(expandedTasks[catId]){delete expandedTasks[catId];renderCategories();return;}
    expandedTasks[catId]=true; renderCategories();
    const panel=document.getElementById(`tasks-panel-${catId}`);
    try{
      const data=await api(`/api/categories/${catId}`);
      const tasks=data.tasks||[];
      if(!tasks.length){panel.innerHTML='<p class="no-tasks">No tasks yet</p>';return;}
      panel.innerHTML=tasks.map(t=>`<label class="task-row ${t.completed?"task-done":""}">
        <input type="checkbox" class="task-tick" data-task-id="${t.id}" data-cat-id="${catId}" ${t.completed?"checked":""}/>
        <span class="task-label">${t.title}</span>
        <span class="task-priority tp-${(t.priority||'Medium').toLowerCase()}">${t.priority||'Medium'}</span>
      </label>`).join("");
      // attach tick handlers
      panel.querySelectorAll(".task-tick").forEach(cb=>{
        cb.addEventListener("change",async e=>{
          e.stopPropagation();
          const tid=parseInt(cb.dataset.taskId), cid=parseInt(cb.dataset.catId);
          await api(`/api/tasks/${tid}`,{method:"PUT",body:{completed:cb.checked}});
          // update local stats
          const cat=allCategories.find(c=>c.id===cid);
          if(cat){
            if(cb.checked){cat.completed_tasks++;} else{cat.completed_tasks=Math.max(0,cat.completed_tasks-1);}
            cat.completion_rate=cat.total_tasks>0?Math.round(cat.completed_tasks/cat.total_tasks*100):0;
          }
          // update progress bar + rate text without full re-render
          const card=cb.closest(".cat-card");
          card.querySelector(".cat-progress-bar").style.width=cat.completion_rate+"%";
          card.querySelector(".cat-rate").textContent=cat.completion_rate+"% complete";
          cb.closest(".task-row").classList.toggle("task-done",cb.checked);
        });
      });
    }catch(e){panel.innerHTML='<p class="no-tasks">Could not load tasks</p>';}
  }

  function attachCardListeners(){
    grid.querySelectorAll(".cat-cb").forEach(cb=>{cb.addEventListener("change",e=>{e.stopPropagation();const id=parseInt(cb.dataset.id);if(cb.checked)selectedIds.add(id);else selectedIds.delete(id);updateBulkBar();cb.closest(".cat-card").classList.toggle("selected",cb.checked);});});
    grid.querySelectorAll(".cat-menu-btn").forEach(btn=>{btn.addEventListener("click",e=>{e.stopPropagation();const dd=document.getElementById(`dropdown-${btn.dataset.id}`);document.querySelectorAll(".cat-dropdown.open").forEach(d=>{if(d!==dd)d.classList.remove("open");});dd.classList.toggle("open");});});
    grid.querySelectorAll(".cat-dd-item").forEach(item=>{item.addEventListener("click",e=>{e.stopPropagation();const action=item.dataset.action,id=parseInt(item.dataset.id);document.querySelectorAll(".cat-dropdown.open").forEach(d=>d.classList.remove("open"));if(action==="edit")openEditModal(id);else if(action==="delete")showConfirm("Delete this category?",()=>deleteCategory(id));else if(action==="add-task")openAddTaskModal(id);else if(action==="archive")archiveCategory(id);});});
    grid.querySelectorAll(".expand-btn").forEach(btn=>{btn.addEventListener("click",e=>{e.stopPropagation();toggleExpand(parseInt(btn.dataset.id));});});
  }

  document.addEventListener("click",()=>{document.querySelectorAll(".cat-dropdown.open").forEach(d=>d.classList.remove("open"));});

  function updateBulkBar(){bulkBar.style.display=selectedIds.size>0?"flex":"none";document.getElementById("selected-count").textContent=`${selectedIds.size} selected`;}
  document.getElementById("bulk-delete-btn").addEventListener("click",()=>{showConfirm(`Delete ${selectedIds.size} categories?`,async()=>{await api("/api/categories/delete-multiple",{method:"POST",body:{ids:Array.from(selectedIds)}});selectedIds.clear();updateBulkBar();loadCategories();});});

  function openModal(el){el.style.display="flex";}function closeModal(el){el.style.display="none";}
  document.querySelectorAll(".cat-modal-overlay").forEach(ov=>{ov.addEventListener("click",()=>closeModal(ov.parentElement));});

  document.getElementById("add-category-btn").addEventListener("click",()=>{editingId=null;document.getElementById("modal-title").textContent="Add Category";document.getElementById("cat-name").value="";document.getElementById("cat-desc").value="";document.getElementById("cat-color").value="#3b82f6";setActiveIcon("fa-folder");openModal(modal);});

  function openEditModal(id){const cat=allCategories.find(c=>c.id===id);if(!cat)return;editingId=id;document.getElementById("modal-title").textContent="Edit Category";document.getElementById("cat-name").value=cat.name;document.getElementById("cat-desc").value=cat.description||"";document.getElementById("cat-color").value=cat.color;setActiveIcon(cat.icon||"fa-folder");openModal(modal);}

  document.getElementById("modal-cancel-btn").addEventListener("click",()=>closeModal(modal));
  document.getElementById("modal-confirm-btn").addEventListener("click",async()=>{
    const name=document.getElementById("cat-name").value.trim();if(!name)return;
    const body={name,color:document.getElementById("cat-color").value,icon:document.querySelector(".icon-option.active")?.dataset.icon||"fa-folder",description:document.getElementById("cat-desc").value.trim()};
    if(editingId){const data=await api(`/api/categories/${editingId}`,{method:"PUT",body});if(data.category){const idx=allCategories.findIndex(c=>c.id===editingId);if(idx>=0)allCategories[idx]=data.category;renderCategories();}}
    else{const data=await api("/api/categories",{method:"POST",body});if(data.category){allCategories.unshift(data.category);renderCategories();}}
    closeModal(modal);
  });

  document.querySelectorAll(".icon-option").forEach(opt=>{opt.addEventListener("click",()=>setActiveIcon(opt.dataset.icon));});
  function setActiveIcon(icon){document.querySelectorAll(".icon-option").forEach(o=>o.classList.toggle("active",o.dataset.icon===icon));}
  document.querySelectorAll(".preset-colors .color-swatch").forEach(sw=>{sw.addEventListener("click",()=>{document.getElementById("cat-color").value=sw.dataset.color;});});
  document.getElementById("suggest-color-btn").addEventListener("click",async()=>{const btn=document.getElementById("suggest-color-btn");btn.innerHTML='<i class="fa-solid fa-spinner fa-spin"></i>';try{const d=await api("/api/categories/suggest-color");document.getElementById("cat-color").value=d.color;}catch(e){}btn.innerHTML='<i class="fa-solid fa-palette"></i>';});

  async function deleteCategory(id){await api(`/api/categories/${id}`,{method:"DELETE"});allCategories=allCategories.filter(c=>c.id!==id);selectedIds.delete(id);updateBulkBar();renderCategories();}
  async function archiveCategory(id){const data=await api(`/api/categories/${id}/archive`,{method:"PATCH"});const cat=allCategories.find(c=>c.id===id);if(cat)cat.archived=data.archived;renderCategories();}

  function openAddTaskModal(id){addTaskCategoryId=id;const cat=allCategories.find(c=>c.id===id);document.getElementById("task-modal-cat-name").textContent=cat?cat.name:"";document.getElementById("new-task-title").value="";document.getElementById("new-task-desc").value="";openModal(taskModal);}
  document.getElementById("task-modal-cancel").addEventListener("click",()=>closeModal(taskModal));
  document.getElementById("task-modal-confirm").addEventListener("click",async()=>{const title=document.getElementById("new-task-title").value.trim();if(!title)return;await api(`/api/categories/${addTaskCategoryId}/tasks`,{method:"POST",body:{title,description:document.getElementById("new-task-desc").value.trim()}});closeModal(taskModal);delete expandedTasks[addTaskCategoryId];loadCategories();});

  document.getElementById("smart-create-btn").addEventListener("click",()=>{document.getElementById("smart-input").value="";document.getElementById("smart-preview").style.display="none";document.getElementById("smart-generate").style.display="";document.getElementById("smart-save").style.display="none";smartData=null;openModal(smartModal);});
  document.getElementById("smart-cancel").addEventListener("click",()=>closeModal(smartModal));
  document.getElementById("smart-generate").addEventListener("click",async()=>{const input=document.getElementById("smart-input").value.trim();if(!input)return;const btn=document.getElementById("smart-generate");btn.innerHTML='<i class="fa-solid fa-spinner fa-spin"></i> Generating...';btn.disabled=true;try{smartData=await api("/api/categories/smart-create",{method:"POST",body:{description:input}});if(smartData.error){document.getElementById("smart-preview").innerHTML=`<p class="smart-err">${smartData.error}</p>`;}else{document.getElementById("smart-preview").innerHTML=`<div class="smart-card" style="border-left:4px solid ${smartData.color};"><i class="fa-solid ${smartData.icon}" style="color:${smartData.color};"></i><strong>${smartData.name}</strong></div>`;document.getElementById("smart-generate").style.display="none";document.getElementById("smart-save").style.display="";}document.getElementById("smart-preview").style.display="block";}catch(e){}btn.innerHTML='<i class="fa-solid fa-wand-magic-sparkles"></i> Generate';btn.disabled=false;});
  document.getElementById("smart-save").addEventListener("click",async()=>{if(!smartData)return;const data=await api("/api/categories",{method:"POST",body:smartData});if(data.category){allCategories.unshift(data.category);renderCategories();}closeModal(smartModal);});

  function showConfirm(msg,cb){document.getElementById("confirm-msg").textContent=msg;confirmCallback=cb;openModal(confirmDialog);}
  document.getElementById("confirm-no").addEventListener("click",()=>closeModal(confirmDialog));
  document.getElementById("confirm-yes").addEventListener("click",()=>{closeModal(confirmDialog);if(confirmCallback)confirmCallback();});

  document.getElementById("sort-by").addEventListener("change",renderCategories);
  document.getElementById("filter-by").addEventListener("change",()=>loadCategories());
  loadCategories();
});
</script>
{% endblock %}
